services:
  existsbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: existsbot
    restart: unless-stopped

    env_file:
      - .env

    environment:
      API_ENABLED: "true"
      API_HOST: "0.0.0.0"
      API_PORT: "8080"
      REGISTRY_DIR: "/app/domains"
      DATABASE_PATH: "/app/data/users.db"

    ports:
      - "6767:8080"

    volumes:
      - ./domains:/app/domains
      - ./data:/app/data
      - ./.git:/app/.git
      - ./scripts:/app/scripts:ro
      - ./docker-compose.yml:/app/docker-compose.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock

    working_dir: /app

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  cloudflare-existslol:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare-existslol
    restart: unless-stopped

    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}

    depends_on:
      - existsbot
