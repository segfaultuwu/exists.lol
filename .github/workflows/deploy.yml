name: Deploy DNS

on:
  push:
    branches: [main]
    paths:
      - "domains/**"
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: main

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build
        run: go build ./cmd/existslol

      - name: Sync DNS
        run: go run ./cmd/existslol
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          ROOT_DOMAIN: ${{ secrets.ROOT_DOMAIN }}
